name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "0"
      KODA_SKIP_TOOLCHAIN_EXTRACT: "1"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm -y

      - name: Add LLVM to PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Install GNU timeout (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install coreutils
          echo "$(brew --prefix coreutils)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Install toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm build-essential

      - name: Build C runtime (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force runtime\obj_win | Out-Null
          clang -c runtime\src\value.c        -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\value.o
          clang -c runtime\src\object.c       -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\object.o
          clang -c runtime\src\gc.c           -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\gc.o
          clang -c runtime\src\koda_runtime.c -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\koda_runtime.o
          llvm-ar rcs runtime\libkoda_runtime.a runtime\obj_win\value.o runtime\obj_win\object.o runtime\obj_win\gc.o runtime\obj_win\koda_runtime.o

      - name: Build C runtime (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            CC_BIN="$(xcrun --find clang)"
            AR_BIN="ar"
          else
            CC_BIN="$(command -v clang-20 || command -v clang-19 || command -v clang-18 || command -v clang || command -v gcc)"
            AR_BIN="$(command -v llvm-ar-20 || command -v llvm-ar-19 || command -v llvm-ar-18 || command -v llvm-ar || command -v ar)"
          fi
          if [[ -z "$CC_BIN" || ! -x "$CC_BIN" ]]; then
            echo "no C compiler found (tried clang-20 … gcc)" >&2
            exit 1
          fi
          if [[ -z "$AR_BIN" || ! -x "$AR_BIN" ]]; then
            echo "no archiver found (tried llvm-ar-20 … ar)" >&2
            exit 1
          fi
          echo "Using CC: $CC_BIN"
          echo "Using AR: $AR_BIN"
          mkdir -p runtime/obj
          "$CC_BIN" -c runtime/src/value.c        -O2 -std=c11 -Iruntime/src -o runtime/obj/value.o
          "$CC_BIN" -c runtime/src/object.c       -O2 -std=c11 -Iruntime/src -o runtime/obj/object.o
          "$CC_BIN" -c runtime/src/gc.c           -O2 -std=c11 -Iruntime/src -o runtime/obj/gc.o
          "$CC_BIN" -c runtime/src/koda_runtime.c -O2 -std=c11 -Iruntime/src -o runtime/obj/koda_runtime.o
          "$AR_BIN" rcs runtime/libkoda_runtime.a runtime/obj/value.o runtime/obj/object.o runtime/obj/gc.o runtime/obj/koda_runtime.o

      - name: Export CI paths (GITHUB_ENV)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "KODA_CI_BIN=$RUNNER_TEMP/koda.exe" >> "$GITHUB_ENV"
            echo "CI_ARTIFACT_DIR=$RUNNER_TEMP/ci-out" >> "$GITHUB_ENV"
            echo "WRAPGEN_SMOKE_OUT=$RUNNER_TEMP/ci-out/raylib_wrapgen_smoke" >> "$GITHUB_ENV"
          else
            echo "KODA_CI_BIN=/tmp/koda" >> "$GITHUB_ENV"
            echo "CI_ARTIFACT_DIR=/tmp/ci-out" >> "$GITHUB_ENV"
            echo "WRAPGEN_SMOKE_OUT=/tmp/ci-out/raylib_wrapgen_smoke" >> "$GITHUB_ENV"
          fi

      - name: Create CI artifact directory
        shell: bash
        run: mkdir -p "$CI_ARTIFACT_DIR"

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -count=1

      - name: Build CLIs
        shell: bash
        run: |
          set -euo pipefail
          go build -trimpath -o "$KODA_CI_BIN" ./cmd/koda
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            go build -trimpath -o "$RUNNER_TEMP/kodawrap.exe" ./cmd/wrapgen
          else
            go build -trimpath -o /tmp/kodawrap ./cmd/wrapgen
            go build -trimpath -o /tmp/wrapgen ./cmd/wrapgen
          fi

      - name: koda fmt --check
        shell: bash
        run: |
          set -euo pipefail
          "$KODA_CI_BIN" fmt --check ./...

      - name: koda check (sema, no LLVM)
        shell: bash
        run: |
          set -euo pipefail
          "$KODA_CI_BIN" check tests/hello.koda
          if "$KODA_CI_BIN" check tests/undefined_var.koda 2>/dev/null; then echo "expected check to fail"; exit 1; fi
          if "$KODA_CI_BIN" check tests/sema_errors.koda 2>/dev/null; then echo "expected sema_errors check to fail"; exit 1; fi
          if "$KODA_CI_BIN" check tests/struct_typo_test.koda 2>/dev/null; then echo "expected struct field typo check to fail"; exit 1; fi

      - name: Native smoke (koda build / run)
        shell: bash
        run: bash scripts/ci-native-smoke.sh

      - name: GC soak + stress smoke (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          timeout 90s "$KODA_CI_BIN" run tests/gc_pressure_expr.koda
          timeout 90s "$KODA_CI_BIN" run tests/globals_perf.koda
          timeout 90s "$KODA_CI_BIN" run tests/gc_soak.koda
          timeout 120s "$KODA_CI_BIN" run --no-opt tests/nursery_test.koda
          timeout 120s "$KODA_CI_BIN" run --no-opt tests/incremental_gc_test.koda
          timeout 90s "$KODA_CI_BIN" run tests/stress/stress_mixed_alloc.koda
          timeout 120s "$KODA_CI_BIN" run --no-opt tests/stress/large_game_sim.koda

      - name: GC soak + stress smoke (Windows)
        if: runner.os == 'Windows'
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci-gc-stress-timed.ps1

      - name: Parser fuzz (smoke, 5s)
        run: go test ./internal/parser -fuzz=FuzzParse -fuzztime=5s -count=1

      - name: Wrapgen Raylib + link smoke
        env:
          KODA_BIN: ${{ env.KODA_CI_BIN }}
        shell: bash
        run: bash scripts/ci-wrapgen-raylib.sh
