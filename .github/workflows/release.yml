# Jobs populate internal/embed/<GOOS>/<GOARCH>/ (clang [+ lld on Windows], libkoda_runtime.a),
# then build with -tags release. Triggered by version tags.

name: Release

on:
  push:
    tags:
      - "v*"

env:
  CGO_ENABLED: "0"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install LLVM
        run: choco install llvm -y

      - name: Add LLVM to PATH
        run: echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Build C runtime
        run: |
          New-Item -ItemType Directory -Force runtime\obj_win | Out-Null
          clang -c runtime\src\value.c        -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\value.o
          clang -c runtime\src\object.c       -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\object.o
          clang -c runtime\src\gc.c           -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\gc.o
          clang -c runtime\src\koda_runtime.c -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\koda_runtime.o
          llvm-ar rcs runtime\libkoda_runtime.a runtime\obj_win\value.o runtime\obj_win\object.o runtime\obj_win\gc.o runtime\obj_win\koda_runtime.o

      - name: Populate embed/windows/amd64
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          $clang = Join-Path $llvmBin "clang.exe"
          if (!(Test-Path $clang)) { throw "missing $clang" }
          $lld = Join-Path $llvmBin "lld.exe"
          if (!(Test-Path $lld)) { throw "missing $lld" }
          $llc = $null
          foreach ($n in @("llc.exe", "llc-20.exe", "llc-19.exe", "llc-18.exe", "llc-17.exe")) {
            $c = Join-Path $llvmBin $n
            if (Test-Path $c) { $llc = $c; break }
          }
          if (-not $llc) {
            $found = Get-ChildItem -Path $llvmBin -Filter "llc*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $llc = $found.FullName }
          }
          if (-not $llc) { throw "no llc*.exe under $llvmBin (LLVM package layout changed)" }
          New-Item -ItemType Directory -Force internal\embed\windows\amd64 | Out-Null
          Copy-Item $clang internal\embed\windows\amd64\clang.exe
          Copy-Item $llc   internal\embed\windows\amd64\llc.exe
          Copy-Item $lld   internal\embed\windows\amd64\lld.exe
          Copy-Item runtime\libkoda_runtime.a internal\embed\windows\amd64\

      - name: Build koda.exe
        run: go build -trimpath -tags release -ldflags="-s -w" -o koda-windows-amd64.exe ./cmd/koda

      - name: Build kodawrap.exe
        run: go build -trimpath -tags release -ldflags="-s -w" -o kodawrap-windows-amd64.exe ./cmd/wrapgen

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Koda Studio
        run: |
          cd koda-ide/frontend
          npm ci
          npm run build
          cd ..
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          wails build -s -m -nopackage -tags native_webview2loader
          $bin = "build\bin"
          if (Test-Path "$bin\Koda Studio.exe") {
            Copy-Item "$bin\Koda Studio.exe" koda-studio-windows-amd64.exe
          } elseif (Test-Path "$bin\koda-ide.exe") {
            Copy-Item "$bin\koda-ide.exe" koda-studio-windows-amd64.exe
          } else {
            throw "Koda Studio build output not found under $bin"
          }

      - name: Test
        shell: bash
        env:
          CI_ARTIFACT_DIR: ${{ runner.temp }}/koda-release-smoke
        run: bash scripts/ci-release-smoke.sh ./koda-windows-amd64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            koda-windows-amd64.exe
            kodawrap-windows-amd64.exe
            koda-studio-windows-amd64.exe

  linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Build C runtime
        shell: bash
        run: |
          set -euo pipefail
          CLANG_BIN="$(command -v clang-20 || command -v clang-19 || command -v clang-18 || command -v clang || command -v cc || true)"
          LLVM_AR_BIN="$(command -v llvm-ar-20 || command -v llvm-ar-19 || command -v llvm-ar-18 || command -v llvm-ar || command -v ar || true)"
          if [[ -z "$CLANG_BIN" ]]; then
            echo "no clang/cc found on PATH" >&2
            exit 1
          fi
          if [[ -z "$LLVM_AR_BIN" ]]; then
            echo "no llvm-ar/ar found on PATH" >&2
            exit 1
          fi
          mkdir -p runtime/obj_linux
          "$CLANG_BIN" -c runtime/src/value.c        -O2 -std=c11 -Iruntime/src -o runtime/obj_linux/value.o
          "$CLANG_BIN" -c runtime/src/object.c       -O2 -std=c11 -Iruntime/src -o runtime/obj_linux/object.o
          "$CLANG_BIN" -c runtime/src/gc.c           -O2 -std=c11 -Iruntime/src -o runtime/obj_linux/gc.o
          "$CLANG_BIN" -c runtime/src/koda_runtime.c -O2 -std=c11 -Iruntime/src -o runtime/obj_linux/koda_runtime.o
          "$LLVM_AR_BIN" rcs runtime/libkoda_runtime.a runtime/obj_linux/*.o

      - name: Populate embed/linux/amd64
        shell: bash
        run: |
          set -euo pipefail
          CLANG_BIN="$(command -v clang-20 || command -v clang-19 || command -v clang-18 || command -v clang || command -v cc || true)"
          LLC_BIN="$(command -v llc-20 || command -v llc-19 || command -v llc-18 || command -v llc || true)"
          if [[ -z "$CLANG_BIN" ]]; then
            echo "no clang/cc found on PATH" >&2
            exit 1
          fi
          if [[ -z "$LLC_BIN" ]]; then
            echo "no llc found on PATH" >&2
            exit 1
          fi
          mkdir -p internal/embed/linux/amd64
          cp "$CLANG_BIN"                internal/embed/linux/amd64/clang
          cp "$LLC_BIN"                  internal/embed/linux/amd64/llc
          cp runtime/libkoda_runtime.a internal/embed/linux/amd64/

      - name: Build koda
        run: go build -trimpath -tags release -ldflags="-s -w" -o koda-linux-amd64 ./cmd/koda

      - name: Build kodawrap
        run: go build -trimpath -tags release -ldflags="-s -w" -o kodawrap-linux-amd64 ./cmd/wrapgen

      - name: Install Koda Studio Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Build Koda Studio
        run: |
          chmod +x scripts/ci-build-koda-studio.sh
          bash scripts/ci-build-koda-studio.sh koda-studio-linux-amd64

      - name: Test
        shell: bash
        env:
          CI_ARTIFACT_DIR: ${{ runner.temp }}/koda-release-smoke
        run: |
          set -euo pipefail
          chmod +x koda-linux-amd64 kodawrap-linux-amd64
          bash scripts/ci-release-smoke.sh ./koda-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            koda-linux-amd64
            kodawrap-linux-amd64
            koda-studio-linux-amd64

  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Build C runtime
        shell: bash
        run: |
          set -euo pipefail
          CLANG_BIN="$(command -v clang-20 || command -v clang-19 || command -v clang-18 || command -v clang || command -v cc || true)"
          LLVM_AR_BIN="$(command -v llvm-ar-20 || command -v llvm-ar-19 || command -v llvm-ar-18 || command -v llvm-ar || command -v ar || true)"
          if [[ -z "$CLANG_BIN" ]]; then
            echo "no clang/cc found on PATH" >&2
            exit 1
          fi
          if [[ -z "$LLVM_AR_BIN" ]]; then
            echo "no llvm-ar/ar found on PATH" >&2
            exit 1
          fi
          mkdir -p runtime/obj_linux_arm64
          "$CLANG_BIN" -c runtime/src/value.c        -O2 -std=c11 -Iruntime/src -o runtime/obj_linux_arm64/value.o
          "$CLANG_BIN" -c runtime/src/object.c       -O2 -std=c11 -Iruntime/src -o runtime/obj_linux_arm64/object.o
          "$CLANG_BIN" -c runtime/src/gc.c           -O2 -std=c11 -Iruntime/src -o runtime/obj_linux_arm64/gc.o
          "$CLANG_BIN" -c runtime/src/koda_runtime.c -O2 -std=c11 -Iruntime/src -o runtime/obj_linux_arm64/koda_runtime.o
          "$LLVM_AR_BIN" rcs runtime/libkoda_runtime.a runtime/obj_linux_arm64/*.o

      - name: Populate embed/linux/arm64
        shell: bash
        run: |
          set -euo pipefail
          CLANG_BIN="$(command -v clang-20 || command -v clang-19 || command -v clang-18 || command -v clang || command -v cc || true)"
          LLC_BIN="$(command -v llc-20 || command -v llc-19 || command -v llc-18 || command -v llc || true)"
          if [[ -z "$CLANG_BIN" ]]; then
            echo "no clang/cc found on PATH" >&2
            exit 1
          fi
          if [[ -z "$LLC_BIN" ]]; then
            echo "no llc found on PATH" >&2
            exit 1
          fi
          mkdir -p internal/embed/linux/arm64
          cp "$CLANG_BIN"                internal/embed/linux/arm64/clang
          cp "$LLC_BIN"                  internal/embed/linux/arm64/llc
          cp runtime/libkoda_runtime.a internal/embed/linux/arm64/

      - name: Build koda
        run: GOARCH=arm64 go build -trimpath -tags release -ldflags="-s -w" -o koda-linux-arm64 ./cmd/koda

      - name: Build kodawrap
        run: go build -trimpath -tags release -ldflags="-s -w" -o kodawrap-linux-arm64 ./cmd/wrapgen

      - name: Install Koda Studio Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Build Koda Studio
        run: |
          chmod +x scripts/ci-build-koda-studio.sh
          bash scripts/ci-build-koda-studio.sh koda-studio-linux-arm64

      - name: Test
        shell: bash
        env:
          CI_ARTIFACT_DIR: ${{ runner.temp }}/koda-release-smoke
        run: |
          set -euo pipefail
          chmod +x koda-linux-arm64 kodawrap-linux-arm64
          bash scripts/ci-release-smoke.sh ./koda-linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            koda-linux-arm64
            kodawrap-linux-arm64
            koda-studio-linux-arm64

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install LLVM
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Build C runtime — amd64
        run: |
          CLANG_BIN="$(xcrun --sdk macosx --find clang)"
          SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          mkdir -p runtime/obj_macos_amd64
          "$CLANG_BIN" -c runtime/src/value.c        -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch x86_64 -o runtime/obj_macos_amd64/value.o
          "$CLANG_BIN" -c runtime/src/object.c       -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch x86_64 -o runtime/obj_macos_amd64/object.o
          "$CLANG_BIN" -c runtime/src/gc.c           -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch x86_64 -o runtime/obj_macos_amd64/gc.o
          "$CLANG_BIN" -c runtime/src/koda_runtime.c -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch x86_64 -o runtime/obj_macos_amd64/koda_runtime.o
          llvm-ar rcs runtime/libkoda_runtime_amd64.a runtime/obj_macos_amd64/*.o

      - name: Build C runtime — arm64
        run: |
          CLANG_BIN="$(xcrun --sdk macosx --find clang)"
          SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          mkdir -p runtime/obj_macos_arm64
          "$CLANG_BIN" -c runtime/src/value.c        -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch arm64 -o runtime/obj_macos_arm64/value.o
          "$CLANG_BIN" -c runtime/src/object.c       -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch arm64 -o runtime/obj_macos_arm64/object.o
          "$CLANG_BIN" -c runtime/src/gc.c           -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch arm64 -o runtime/obj_macos_arm64/gc.o
          "$CLANG_BIN" -c runtime/src/koda_runtime.c -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch arm64 -o runtime/obj_macos_arm64/koda_runtime.o
          llvm-ar rcs runtime/libkoda_runtime_arm64.a runtime/obj_macos_arm64/*.o

      - name: Populate embed/darwin
        run: |
          mkdir -p internal/embed/darwin/amd64
          mkdir -p internal/embed/darwin/arm64
          cp "$(which clang)"                       internal/embed/darwin/amd64/clang
          cp "$(which clang)"                       internal/embed/darwin/arm64/clang
          cp "$(which llc)"                         internal/embed/darwin/amd64/llc
          cp "$(which llc)"                         internal/embed/darwin/arm64/llc
          cp runtime/libkoda_runtime_amd64.a      internal/embed/darwin/amd64/libkoda_runtime.a
          cp runtime/libkoda_runtime_arm64.a      internal/embed/darwin/arm64/libkoda_runtime.a

      - name: Build koda — amd64
        run: GOARCH=amd64 go build -trimpath -tags release -ldflags="-s -w" -o koda-darwin-amd64 ./cmd/koda

      - name: Build koda — arm64
        run: GOARCH=arm64 go build -trimpath -tags release -ldflags="-s -w" -o koda-darwin-arm64 ./cmd/koda

      - name: Build kodawrap — arm64 (host)
        run: go build -trimpath -tags release -ldflags="-s -w" -o kodawrap-darwin-arm64 ./cmd/wrapgen

      - name: Build kodawrap — amd64 (cross)
        run: GOOS=darwin GOARCH=amd64 go build -trimpath -tags release -ldflags="-s -w" -o kodawrap-darwin-amd64 ./cmd/wrapgen

      - name: Build Koda Studio
        run: |
          chmod +x scripts/ci-build-koda-studio.sh
          bash scripts/ci-build-koda-studio.sh "Koda Studio.app"

      - name: Test
        shell: bash
        env:
          CI_ARTIFACT_DIR: ${{ runner.temp }}/koda-release-smoke
        run: |
          set -euo pipefail
          chmod +x koda-darwin-arm64 koda-darwin-amd64 kodawrap-darwin-arm64 kodawrap-darwin-amd64
          bash scripts/ci-release-smoke.sh ./koda-darwin-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            koda-darwin-amd64
            koda-darwin-arm64
            kodawrap-darwin-amd64
            kodawrap-darwin-arm64
            Koda Studio.app

  publish:
    needs: [windows, linux-amd64, linux-arm64, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Vendor raylib 6.0 (per platform) for SDK zips
        run: |
          chmod +x scripts/vendor-raylib-stage.sh
          bash scripts/vendor-raylib-stage.sh "${GITHUB_WORKSPACE}/.raylib-vendor"

      - name: Package offline SDK zip (per platform)
        env:
          RAYLIB_VENDOR_ROOT: ${{ github.workspace }}/.raylib-vendor
        run: |
          chmod +x scripts/package-release-sdk.sh
          bash scripts/package-release-sdk.sh "${{ github.ref_name }}" artifacts sdk-zips
          ls -la sdk-zips

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows/koda-windows-amd64.exe
            artifacts/windows/kodawrap-windows-amd64.exe
            artifacts/windows/koda-studio-windows-amd64.exe
            artifacts/linux-amd64/koda-linux-amd64
            artifacts/linux-amd64/kodawrap-linux-amd64
            artifacts/linux-arm64/koda-linux-arm64
            artifacts/linux-arm64/kodawrap-linux-arm64
            artifacts/macos/koda-darwin-amd64
            artifacts/macos/koda-darwin-arm64
            artifacts/macos/kodawrap-darwin-amd64
            artifacts/macos/kodawrap-darwin-arm64
            sdk-zips/*.zip
          body: |
            ## Koda Programming Language

            ### Offline SDK zips (**recommended**)

            **Windows**, **Linux** (x64 + ARM64), and **macOS** (Intel + Apple Silicon): one zip per CPU OS pair. Each **`koda-*-sdk-*.zip`** is self-contained:

            | Archive | Contents |
            |---------|----------|
            | **`koda-${{ github.ref_name }}-sdk-windows-amd64.zip`** | `koda.exe`, `kodawrap.exe`, **`Koda Studio.exe`**, launchers, `stdlib/`, `docs/`, `examples/`, Raylib stage |
            | **`koda-${{ github.ref_name }}-sdk-linux-amd64.zip`** | `koda`, **`Koda Studio`**, **`start-koda-studio.sh`**, same SDK layout |
            | **`koda-${{ github.ref_name }}-sdk-linux-arm64.zip`** | same (ARM64); raylib stage may be README-only on ARM64 Linux |
            | **`koda-${{ github.ref_name }}-sdk-darwin-amd64.zip`** | Intel `koda` + **`Koda Studio.app`** (Apple Silicon build; runs on Intel via Rosetta when available) |
            | **`koda-${{ github.ref_name }}-sdk-darwin-arm64.zip`** | Apple Silicon native |

            Extract anywhere; keep **`stdlib/`** next to **`koda`**. Embedded **Clang + llc + runtime** (and Windows `lld`) ship **inside** the `koda` binary — **no LLVM install** and **`koda` does not download anything from the internet** when you compile; tools unpack from the binary to a **local temp directory** on first use only. Raylib (where included in the zip) is already on disk under **`third_party/raylib_static/stage/`**. Wrapping/linking **other** external C libs still uses libraries you provide (see `docs/wrappers.md` in the zip).

            ### Loose binaries only

            | Platform | Compiler | Wrapper Tool |
            |----------|----------|--------------|
            | Windows 64-bit | koda-windows-amd64.exe | kodawrap-windows-amd64.exe |
            | Linux 64-bit | koda-linux-amd64 | kodawrap-linux-amd64 |
            | Linux ARM64 | koda-linux-arm64 | kodawrap-linux-arm64 |
            | macOS Intel | koda-darwin-amd64 | kodawrap-darwin-amd64 |
            | macOS Apple Silicon | koda-darwin-arm64 | kodawrap-darwin-arm64 |

            ### Windows

            ```powershell
            koda-windows-amd64.exe build hello.koda -o hello.exe
            .\hello.exe
            ```

            ### Linux

            ```bash
            chmod +x koda-linux-amd64
            ./koda-linux-amd64 build hello.koda -o hello
            ./hello
            ```

            ### macOS

            ```bash
            chmod +x koda-darwin-arm64
            ./koda-darwin-arm64 build hello.koda -o hello
            ./hello
            ```
