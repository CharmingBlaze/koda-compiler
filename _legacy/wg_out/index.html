<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>minimal API — Koda bindings</title>
<style>
:root { --bg:#fafafa; --sidebar:#1a1a2e; --accent:#e94560; --code:#f4f4f4; --text:#222; }
@media (prefers-color-scheme: dark) {
  :root { --bg:#12121a; --sidebar:#0f0f18; --code:#1e1e28; --text:#eaeaea; }
}
* { box-sizing: border-box; }
body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
nav.sidebar { width:260px; background:var(--sidebar); color:#eee; padding:1rem; flex-shrink:0; }
nav.sidebar a { color:#bcd; text-decoration:none; }
nav.sidebar a:hover { color:var(--accent); }
nav .logo { font-weight:700; margin-bottom:1rem; color:#fff; }
#search { width:100%; padding:0.5rem; border-radius:6px; border:none; margin-bottom:1rem; }
main { flex:1; padding:2rem; max-width:900px; }
.fn { margin-bottom:2rem; border-bottom:1px solid #3332; padding-bottom:1.5rem; }
pre.sig { background:var(--code); padding:0.75rem; border-radius:6px; overflow:auto; }
table { border-collapse:collapse; width:100%; margin-top:0.5rem; }
th, td { border:1px solid #4444; padding:0.35rem 0.5rem; text-align:left; }
button.copy { margin-left:0.5rem; font-size:0.75rem; cursor:pointer; }
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo">Koda × minimal</div>
  <input type="search" id="search" placeholder="Search functions…" autocomplete="off">
  <ul class="categories"><li><a href="#miscellaneous">Miscellaneous (2)</a></li>
</ul>
</nav>
<main><section id="miscellaneous"><h2>Miscellaneous</h2>
<article class="fn" data-name="wg_add"><h3><code>wg_add</code></h3><pre class="sig"><code>wg_add(a, b)</code></pre><p>Calls wg_add.</p><table><thead><tr><th>Name</th><th>Type</th></tr></thead><tbody><tr><td>a</td><td>number</td></tr><tr><td>b</td><td>number</td></tr></tbody></table></article>
<article class="fn" data-name="wg_reset"><h3><code>wg_reset</code></h3><pre class="sig"><code>wg_reset()</code></pre><p>Calls wg_reset.</p></article>
</section>
</main>
<script>
(function(){
  var inp = document.getElementById('search');
  if (!inp) return;
  inp.addEventListener('input', function() {
    var q = (inp.value || '').toLowerCase();
    document.querySelectorAll('.fn').forEach(function(el) {
      var n = (el.dataset.name || '').toLowerCase();
      el.style.display = (!q || n.indexOf(q) !== -1) ? '' : 'none';
    });
  });
})();
</script>
</body>
</html>
